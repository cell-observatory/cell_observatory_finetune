[build-system]
requires = ["setuptools>=61.0", "wheel", "torch", "numpy"]
build-backend = "setuptools.build_meta"

[project]
name = "segmentation"
version = "0.1.0"
description = "4D & 5D Segmentation Models"
authors = [{ name = "Hugo Hamilton and Thayer Alshaabi", email = "hph@berkeley.edu" }]
dynamic = ["dependencies"]
[tool.setuptools.dynamic]
dependencies = {file = ["requirements.txt"]}

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
include = ["segmentation", "ops3d"]
